<html lang="zh-CN">
<head>

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; height: 100vh; overflow: hidden; }
        #chart { width: 100vw; height: 100vh; }
        
        /* 图例/切片器 - 悬停展开 */
        .legend-container {
            position: fixed;
            top: 110px;
            left: 0;
            z-index: 100;
            display: flex;
            align-items: stretch;
            height: calc(100vh - 110px - 60px);
        }
        .legend-tab {
            width: 36px;
            height: 100%;
            background: white;
            border-radius: 0 8px 8px 0;
            box-shadow: 2px 0 8px rgba(0,0,0,0.08);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #999;
            writing-mode: vertical-rl;
            transition: background 0.2s;
        }
        .legend-tab:hover,
        .legend-container:hover .legend-tab,
        .legend-container.pinned .legend-tab { background: #e6f7ff; color: #1890ff; }
        
        .legend {
            width: 0;
            height: 100%;
            background: white;
            border-radius: 0 12px 12px 0;
            box-shadow: 2px 0 16px rgba(0,0,0,0.1);
            overflow: hidden;
            opacity: 0;
            transform: translateX(-20px);
            transition: opacity 0.35s ease, transform 0.35s ease, width 0.35s ease;
            white-space: nowrap;
        }
        .legend-container:hover .legend,
        .legend.expanded {
            width: clamp(220px, 20vw, 280px);
            opacity: 1;
            transform: translateX(0);
            padding: 16px;
            overflow-y: auto;
        }
        
        .legend h4 { margin-bottom: 12px; font-size: 14px; color: #333; display: flex; align-items: center; gap: 6px; }
        .legend-section { margin-bottom: 16px; }
        .legend-item { display: flex; align-items: center; margin-bottom: 6px; font-size: 12px; cursor: pointer; padding: 6px 8px; border-radius: 6px; transition: background 0.2s; }
        .legend-item:hover { background: #f5f5f5; }
        .legend-item.selected { 
            background: #e6f7ff !important; 
            border: 1px solid #91d5ff;
        }
        .legend-item.selected .legend-dot,
        .legend-item.selected .legend-square,
        .legend-item.selected .legend-line {
            box-shadow: 0 0 6px currentColor;
        }
        .legend-dot { width: 12px; height: 12px; border-radius: 50%; margin-right: 8px; flex-shrink: 0; }
        .legend-square { width: 12px; height: 12px; border-radius: 2px; margin-right: 8px; flex-shrink: 0; }
        .legend-line { width: 24px; height: 2px; margin-right: 8px; flex-shrink: 0; }
        .legend-count { margin-left: auto; font-size: 10px; color: #999; }
        
        /* 工具栏 */
        .toolbar { 
            position: fixed; 
            top: 20px; 
            left: 40px; 
            display: flex; 
            gap: 8px; 
            z-index: 100; 
            flex-wrap: wrap;
            max-width: calc(100vw - 400px);
        }
        .toolbar-btn { background: white; border: none; padding: 8px 16px; border-radius: 6px; font-size: 13px; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.08); transition: all 0.2s; white-space: nowrap; }
        .toolbar-btn:hover { background: #f5f5f5; }
        .toolbar-btn.active { background: #1890ff; color: white; }
        
        /* 搜索框 */
        .search-box { 
            position: fixed; 
            top: 70px; 
            left: 40px; 
            z-index: 100; 
        }
        .search-input { 
            width: clamp(140px, 20vw, 240px); 
            padding: 8px 12px; 
            border: 1px solid #ddd; 
            border-radius: 6px; 
            font-size: 13px; 
            outline: none; 
            background: white;
        }
        .search-input:focus { border-color: #1890ff; }
        
        /* 面包屑导航 */
        .breadcrumb { 
            position: fixed; 
            top: 110px; 
            left: 40px; 
            display: flex; 
            gap: 4px; 
            z-index: 100; 
            font-size: 13px; 
            color: #666; 
            display: none; 
        }
        .breadcrumb.active { display: flex; }
        .breadcrumb-item { cursor: pointer; padding: 4px 8px; border-radius: 4px; transition: all 0.2s; }
        .breadcrumb-item:hover { background: #f0f0f0; color: #1890ff; }
        
        /* 详情面板 */
        .detail-panel { 
            position: fixed; 
            top: 50%;
            right: 20px;
            transform: translateY(-50%);
            width: clamp(240px, 22vw, 300px); 
            max-height: calc(100vh - 140px);
            background: white; 
            border-radius: 16px; 
            box-shadow: 0 4px 24px rgba(0,0,0,0.15); 
            z-index: 100; 
            display: none; 
            overflow: hidden;
            flex-direction: column;
            cursor: move;
            user-select: none;
        }
        .detail-panel.active { display: flex; }
        .detail-header { 
            padding: 16px 20px; 
            color: white; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            position: relative; 
            flex-shrink: 0; 
        }
        .detail-avatar { 
            width: 48px; 
            height: 48px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 20px; 
            font-weight: bold; 
            border: 3px solid rgba(255,255,255,0.3); 
            flex-shrink: 0; 
        }
        .detail-name-wrap {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
        }
        .detail-name { 
            font-size: 18px; 
            font-weight: 600; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            white-space: nowrap;
            color: white;
        }
        .detail-type { 
            font-size: 12px; 
            opacity: 0.9; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            white-space: nowrap;
            color: rgba(255,255,255,0.85);
        }
        .detail-close { 
            position: absolute; 
            top: 12px; 
            right: 12px; 
            width: 26px; 
            height: 26px; 
            border: none; 
            background: rgba(255,255,255,0.2); 
            border-radius: 50%; 
            cursor: pointer; 
            color: white; 
            font-size: 14px; 
            transition: background 0.2s;
            z-index: 10;
        }
        .detail-close:hover { background: rgba(255,255,255,0.4); }
        
        .detail-body { padding: 12px 20px; flex-shrink: 0; max-height: 120px; overflow-y: auto; }
        .detail-row { display: flex; padding: 6px 0; border-bottom: 1px solid #f0f0f0; font-size: 12px; }
        .detail-row:last-child { border-bottom: none; }
        .detail-label { color: #666; width: 50px; flex-shrink: 0; }
        .detail-value { color: #333; flex: 1; word-break: break-all; }
        
        .detail-relations { padding: 0 16px 16px; overflow-y: auto; flex: 1; min-height: 0; }
        .detail-relations h5 { font-size: 12px; color: #666; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
        .relation-tags { display: flex; flex-wrap: wrap; gap: 6px; }
        .relation-tag { display: inline-flex; align-items: center; padding: 5px 10px; border-radius: 16px; font-size: 11px; background: #f5f5f5; color: #333; cursor: pointer; transition: all 0.2s; border: 1px solid transparent; }
        .relation-tag:hover { background: #e6f7ff; border-color: #1890ff; color: #1890ff; }
        .relation-tag .role { font-size: 10px; color: #999; margin-right: 4px; }
        .relation-tag.product { background: #e6f7ff; border-color: #91d5ff; }
        .relation-tag.person { background: #fff7e6; border-color: #ffc53d; color: #d46b08; }
        
        /* 统计栏 */
        .stats-bar { 
            position: fixed; 
            bottom: 20px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: white; 
            padding: 10px 24px; 
            border-radius: 24px; 
            box-shadow: 0 2px 12px rgba(0,0,0,0.1); 
            display: flex; 
            gap: clamp(16px, 4vw, 32px); 
            z-index: 100; 
        }
        .stat-item { text-align: center; }
        .stat-value { font-size: clamp(16px, 2vw, 20px); font-weight: 600; color: #333; }
        .stat-label { font-size: clamp(10px, 1.2vw, 11px); color: #999; }
        
        /* 聚焦提示 */
        .focus-hint { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #1890ff; color: white; padding: 8px 20px; border-radius: 20px; font-size: 13px; z-index: 100; display: none; box-shadow: 0 2px 12px rgba(24,144,255,0.3); white-space: nowrap; }
        .focus-hint.active { display: block; }
    </style>
</head>

        DATA.products.forEach(p => {
            p.relations.forEach(r => {
                bizStats[r.bizType] = (bizStats[r.bizType] || 0) + r.persons.length;
                r.persons.forEach(p => {
                    if (p.role === '合作类型') coopTypeSet.add(p.name);
                });
            });

        const roleStats = {};
        DATA.persons.forEach(p => {
            p.roles.forEach(r => {
                roleStats[r] = (roleStats[r] || 0) + 1;
            });
        });
        
        let html = `<h4>📊 图例</h4>`;
        
        html += `<div class="legend-section">

            <div class="legend-item"><div class="legend-square" style="background:#4a90d9"></div>产品<span class="legend-count">${productCount}</span></div>
            <div class="legend-item"><div class="legend-dot" style="background:#6c757d"></div>对接人<span class="legend-count">${personCount}</span></div>
        </div>`;
        
        html += `<div class="legend-section">
            <div style="font-size:11px;color:#999;margin-bottom:6px;">业务线（点击筛选）</div>`;
        
        Object.keys(bizStats).sort().forEach(biz => {

        html += `</div><div class="legend-section">
            <div style="font-size:11px;color:#999;margin-bottom:6px;">角色（点击筛选）</div>`;

            html += `<div class="legend-item" data-type="role" data-value="${role}">
                <div class="legend-dot" style="background:${color};width:10px;height:10px;"></div>${role}<span class="legend-count">${roleStats[role]}</span>
            </div>`;
        });
        
        html += `</div><div class="legend-section">
            <div style="font-size:11px;color:#999;margin-bottom:6px;">合作类型（点击筛选）</div>`;
        
        [...coopTypeSet].sort().forEach(ct => {
            const color = ROLE_COLORS['合作类型'];
            html += `<div class="legend-item" data-type="cooptype" data-value="${ct}">
                <div class="legend-dot" style="background:${color};width:10px;height:10px;"></div>${ct}
            </div>`;
        });
        
        html += `</div>`;
        legend.innerHTML = html;
        
        // 筛选状态 - 单选
        let selectedBizType = null;
        let selectedRole = null;
        
        // 业务线筛选 - 单选（点击选中，再点同一个取消）
        legend.querySelectorAll('.legend-item[data-type="biz"]').forEach(item => {
            item.addEventListener('click', () => {
                const value = item.dataset.value;
                
                if (selectedBizType === value) {
                    // 取消选中
                    selectedBizType = null;
                    item.classList.remove('selected');
                } else {
                    // 选中新的，取消之前的
                    legend.querySelectorAll('.legend-item[data-type="biz"]').forEach(i => i.classList.remove('selected'));
                    selectedBizType = value;
                    item.classList.add('selected');
                }
                
                if (selectedBizType) {
                    visibleBizTypes = new Set([selectedBizType]);
                } else {
                    visibleBizTypes = new Set();
                }
                
                renderChart();
            });

        // 角色筛选 - 单选（点击选中，再点同一个取消）
        legend.querySelectorAll('.legend-item[data-type="role"]').forEach(item => {
            item.addEventListener('click', () => {
                const value = item.dataset.value;
                
                if (selectedRole === value) {
                    // 取消选中
                    selectedRole = null;
                    item.classList.remove('selected');
                } else {
                    // 选中新的，取消之前的
                    legend.querySelectorAll('.legend-item[data-type="role"]').forEach(i => i.classList.remove('selected'));
                    selectedRole = value;
                    item.classList.add('selected');
                }
                
                renderChart();
            });

        // 合作类型筛选 - 单选（点击选中，再点同一个取消）
        let selectedCoopType = null;
        
        legend.querySelectorAll('.legend-item[data-type="cooptype"]').forEach(item => {
            item.addEventListener('click', () => {
                const value = item.dataset.value;
                
                if (selectedCoopType === value) {
                    selectedCoopType = null;
                    item.classList.remove('selected');
                } else {
                    legend.querySelectorAll('.legend-item[data-type="cooptype"]').forEach(i => i.classList.remove('selected'));

                    item.classList.add('selected');

    // ============ 图表配置 ============
    function getChartOption(nodes, links) {
        return {
            animation: true,
            animationDuration: 800,
            animationDurationUpdate: 500,
            tooltip: {
                trigger: 'item',
                backgroundColor: 'rgba(255,255,255,0.95)',
                borderColor: '#eee',
                borderWidth: 1,
                textStyle: { color: '#333', fontSize: 12 },
                formatter: function(params) {
                    if (params.dataType === 'edge') {
                        return `<span style="display:inline-block;width:10px;height:10px;background:${params.data.lineStyle.color};border-radius:50%;margin-right:6px;"></span>${params.data.relationType}`;
                    }
                    const node = params.data;
                    if (node.type === 'product') {
                        return `<strong>${node.name}</strong><br/><span style="color:#888">${node.fullName}</span>`;
                    } else {
                        return `<strong>${node.name}</strong><br/><span style="color:#888">${node.role || '对接人'}</span>`;
                    }
                }
            },
            series: [{
                type: 'graph',
                layout: 'force',
                force: {
                    repulsion: 350,
                    edgeLength: [30, 80],
                    gravity: 0.05,
                    layoutAnimation: true,
                    alpha: 0.3,
                    alphaDecay: 0.02,
                    alphaMin: 0.001
                },
                symbol: function(value, params) {
                    return params.data.symbol || 'circle';
                },
                symbolSize: function(value, params) {
                    return params.data.symbolSize || 30;
                },
                roam: true,
                draggable: true,
                label: {
                    show: true,
                    position: 'bottom',
                    formatter: function(params) {
                        return params.data.name;
                    },
                    fontSize: 11,
                    color: 'rgba(0,0,0,0.7)',
                    textShadowColor: 'rgba(255,255,255,0.8)',
                    textShadowBlur: 3
                },
                lineStyle: {
                    width: 1.5,
                    curveness: 0.1,
                    opacity: 0.6
                },
                emphasis: {
                    focus: 'none',
                    scale: 1.5,
                    lineStyle: { width: 3, opacity: 1 },
                    itemStyle: { shadowBlur: 15, shadowColor: 'rgba(24,144,255,0.4)' },
                    label: { fontSize: 13, fontWeight: 'bold' }
                },
                blur: {
                    itemStyle: { opacity: 0.25 },
                    lineStyle: { opacity: 0.1 },
                    label: { opacity: 0.25 }
                },
                data: nodes,
                links: links
            }]
        };
    }
    
    // ============ 聚焦视图 ============
    function getFirstDegreeNodes(nodeId) {
        const connectedIds = new Set([nodeId]);
        
        allLinks.forEach(link => {
            if (link.source === nodeId || link.target === nodeId) {
                connectedIds.add(link.source);
                connectedIds.add(link.target);
            }
        });
        
        return connectedIds;
    }
    
    // ============ 渲染图表 ============
    function renderChart() {
        let visibleNodeIds;
        let isSearchMode = false;
        
        // 搜索模式 - 只显示匹配节点和一级节点
        if (searchKeyword) {
            isSearchMode = true;
            const matchedIds = new Set();
            allNodes.forEach(n => {
                if (n.name.toLowerCase().includes(searchKeyword) || 
                    (n.fullName && n.fullName.toLowerCase().includes(searchKeyword)) ||
                    (n.role && n.role.toLowerCase().includes(searchKeyword))) {
                    matchedIds.add(n.id);
                }
            });
            // 获取一级关联节点
            const firstDegreeIds = new Set();
            matchedIds.forEach(mid => {
                allLinks.forEach(l => {
                    if (l.source === mid || l.target === mid) {
                        firstDegreeIds.add(l.source);
                        firstDegreeIds.add(l.target);
                    }
                });
            });
            visibleNodeIds = firstDegreeIds;
        }
        // 聚焦模式
        else if (isFocused && currentNodeId) {
            visibleNodeIds = getFirstDegreeNodes(currentNodeId);
        }
        // 全局模式
        else {
            visibleNodeIds = new Set(allNodes.map(n => n.id));
        }
        
        // 类型筛选 - 扩展可见节点（保留关联关系！）
        // 聚焦模式下跳过类型筛选，保留聚焦视图
        if (!isFocused) {
            if (showMode === 'products') {
                const productIds = new Set(allNodes.filter(n => n.type === 'product').map(n => n.id));
                allLinks.forEach(l => {
                    if (productIds.has(l.source) || productIds.has(l.target)) {
                        visibleNodeIds.add(l.source);
                        visibleNodeIds.add(l.target);
                    }
                });
            } else if (showMode === 'persons') {
                const personIds = new Set(allNodes.filter(n => n.type === 'person').map(n => n.id));
                allLinks.forEach(l => {
                    if (personIds.has(l.source) || personIds.has(l.target)) {
                        visibleNodeIds.add(l.source);
                        visibleNodeIds.add(l.target);
                    }
                });
            }
        }
        
        // 过滤节点
        let filteredNodes = allNodes.filter(n => {
            if (!visibleNodeIds.has(n.id)) return false;
            // 聚焦模式下不过滤类型
            if (!isFocused && showMode === 'products' && n.type === 'person') return false;
            if (!isFocused && showMode === 'persons' && n.type === 'product') return false;
            return true;
        });
        
        // 过滤边
        let filteredLinks = allLinks.filter(l => {
            if (!visibleNodeIds.has(l.source) || !visibleNodeIds.has(l.target)) return false;
            // 业务线筛选：只保留选中的业务线
            if (visibleBizTypes.size > 0 && !visibleBizTypes.has(l.relationType)) return false;
            return true;
        });
        
        // 角色筛选 - 在过滤后的节点上应用
        let roleFilteredNodes = filteredNodes;
        let roleFilteredLinks = filteredLinks;
        
        // 获取选中的角色（从图例获取）
        const selectedRoleItem = document.querySelector('.legend-item[data-type="role"].selected');
        const selectedRoleValue = selectedRoleItem ? selectedRoleItem.dataset.value : null;
        
        if (selectedRoleValue && !isSearchMode) {
            // 角色筛选模式：只显示该角色的对接人及其关联产品
            const rolePersonIds = new Set();
            filteredNodes.forEach(n => {
                if (n.type === 'person' && n.role === selectedRoleValue) {
                    rolePersonIds.add(n.id);
                }
            });
            
            // 扩展到关联产品
            filteredLinks.forEach(l => {
                if (rolePersonIds.has(l.source)) {
                    rolePersonIds.add(l.target);
                }
            });
            
            roleFilteredNodes = filteredNodes.filter(n => rolePersonIds.has(n.id));
            roleFilteredLinks = filteredLinks.filter(l => rolePersonIds.has(l.source) && rolePersonIds.has(l.target));
        }
        
        // 合作类型筛选
        const selectedCoopTypeItem = document.querySelector('.legend-item[data-type="cooptype"].selected');
        const selectedCoopTypeValue = selectedCoopTypeItem ? selectedCoopTypeItem.dataset.value : null;
        
        if (selectedCoopTypeValue && !isSearchMode) {
            // 找到包含该合作类型的边
            const coopNodeIds = new Set();
            roleFilteredLinks.forEach(l => {
                const personNode = allNodes.find(n => n.id === l.source);
                if (personNode && personNode.role === '合作类型' && personNode.name === selectedCoopTypeValue) {
                    coopNodeIds.add(l.source);
                    coopNodeIds.add(l.target);
                }
            });
            
            // 获取与这些边关联的产品，找出所有关联该产品的对接人
            const connectedProductIds = new Set();
            coopNodeIds.forEach(nid => {
                const node = allNodes.find(n => n.id === nid);
                if (node && node.type === 'product') connectedProductIds.add(nid);
            });
            
            connectedProductIds.forEach(pid => {
                roleFilteredLinks.forEach(l => {
                    if (l.target === pid) {
                        coopNodeIds.add(l.source);
                        coopNodeIds.add(l.target);
                    }
                    if (l.source === pid) {
                        coopNodeIds.add(l.source);
                        coopNodeIds.add(l.target);
                    }
                });
            });
            
            roleFilteredNodes = roleFilteredNodes.filter(n => coopNodeIds.has(n.id));
            roleFilteredLinks = roleFilteredLinks.filter(l => coopNodeIds.has(l.source) && coopNodeIds.has(l.target));
        }
        
        // 更新统计
        const productCount = roleFilteredNodes.filter(n => n.type === 'product').length;
        const personCount = roleFilteredNodes.filter(n => n.type === 'person').length;
        document.getElementById('statProducts').textContent = productCount;
        document.getElementById('statPersons').textContent = personCount;
        document.getElementById('statRelations').textContent = roleFilteredLinks.length;
        
        chart.setOption(getChartOption(roleFilteredNodes, roleFilteredLinks));
    }
    
    // ============ 详情面板 ============
    function showNodeDetail(node) {
        currentNodeId = node.id;
        isFocused = true;
        
        const panel = document.getElementById('detailPanel');
        panel.classList.add('active');
        
        document.getElementById('detailName').textContent = node.name;
        
        if (node.type === 'product') {
            document.getElementById('detailAvatar').textContent = '🎮';
            document.getElementById('detailAvatar').style.background = '#4a90d9';
            document.getElementById('detailHeader').style.background = 'linear-gradient(135deg, #4a90d9, #67b26f)';
            document.getElementById('detailType').textContent = node.fullName;
            
            let bodyHtml = `<div class="detail-row"><div class="detail-label">编号</div><div class="detail-value">${node.name}</div></div>`;
            document.getElementById('detailBody').innerHTML = bodyHtml;
            
            const relatedPersons = [];
            const bizCoopTypes = {}; // 业务线→合作类型集合
            allLinks.filter(l => l.target === node.id).forEach(l => {
                const personNode = allNodes.find(n => n.id === l.source);
                if (personNode) {
                    if (personNode.role === '合作类型') {
                        if (!bizCoopTypes[l.relationType]) bizCoopTypes[l.relationType] = new Set();
                        bizCoopTypes[l.relationType].add(personNode.name);
                    } else {
                        relatedPersons.push({
                            name: personNode.name,
                            bizType: l.relationType,
                            personRole: personNode.role,
                            nodeId: personNode.id
                        });
                    }
                }
            });
            
            const byBiz = {};
            relatedPersons.forEach(p => {
                if (!byBiz[p.bizType]) byBiz[p.bizType] = [];
                byBiz[p.bizType].push(p);
            });
            
            // 每个业务线内按角色重要性排序
            Object.values(byBiz).forEach(persons => {
                persons.sort((a, b) => {
                    const ia = ROLE_ORDER.indexOf(a.personRole);
                    const ib = ROLE_ORDER.indexOf(b.personRole);
                    return (ia === -1 ? 99 : ia) - (ib === -1 ? 99 : ib);
                });
            });
            
            let relHtml = '<h5>关联对接人</h5>';
            Object.keys(byBiz).sort().forEach(biz => {
                const coopStr = bizCoopTypes[biz] ? ' · ' + [...bizCoopTypes[biz]].join('/') : '';
                relHtml += `<div style="margin-bottom:8px">`;
                relHtml += `<span style="font-size:10px;color:#999;margin-bottom:4px;display:block">${biz}<span style="color:#1abc9c;font-size:9px">${coopStr}</span></span>`;
                relHtml += `<div class="relation-tags">`;
                byBiz[biz].forEach(p => {
                    const roleColor = ROLE_COLORS[p.personRole] || '#6c757d';
                    const bgColor = roleColor + '15';
                    relHtml += `<span class="relation-tag person" onclick="jumpToNode('${p.nodeId}')" style="border-color:${roleColor};background:${bgColor}"><span class="role" style="color:${roleColor}">${p.personRole}</span>${p.name}</span>`;
                });
                relHtml += `</div></div>`;
            });
            
            document.getElementById('detailRelations').innerHTML = relHtml || '<p style="color:#999;font-size:12px;text-align:center;padding:20px">暂无关联</p>';
            
        } else {
            document.getElementById('detailAvatar').textContent = node.name[0];
            document.getElementById('detailAvatar').style.background = node.itemStyle.color;
            document.getElementById('detailHeader').style.background = 'linear-gradient(135deg, #667eea, #764ba2)';
            document.getElementById('detailType').textContent = node.role;
            
            const relatedProducts = [];
            // 收集每个产品-业务线组合的合作类型
            const prodBizCoopMap = {}; // key: "prodCode|bizType" -> [coop names]
            allLinks.forEach(l => {
                const pNode = allNodes.find(n => n.id === l.source);
                if (pNode && pNode.role === '合作类型') {
                    const key = l.target + '|' + l.relationType;
                    if (!prodBizCoopMap[key]) prodBizCoopMap[key] = [];
                    prodBizCoopMap[key].push(pNode.name);
                }
            });
            
            allLinks.filter(l => l.source === node.id).forEach(l => {
                const productNode = allNodes.find(n => n.id === l.target);
                if (productNode) {
                    relatedProducts.push({
                        name: productNode.name,
                        fullName: productNode.fullName,
                        bizType: l.relationType,
                        nodeId: productNode.id
                    });
                }
            });
            
            let bodyHtml = `<div class="detail-row"><div class="detail-label">角色</div><div class="detail-value">${node.role || '对接人'}</div></div>`;
            bodyHtml += `<div class="detail-row"><div class="detail-label">负责</div><div class="detail-value">${relatedProducts.length} 个产品</div></div>`;
            document.getElementById('detailBody').innerHTML = bodyHtml;
            
            const byBiz = {};
            relatedProducts.forEach(p => {
                if (!byBiz[p.bizType]) byBiz[p.bizType] = [];
                byBiz[p.bizType].push(p);
            });
            
            let relHtml = '<h5>负责产品</h5>';
            Object.keys(byBiz).sort().forEach(biz => {
                relHtml += `<div style="margin-bottom:8px">`;
                relHtml += `<span style="font-size:10px;color:#999;margin-bottom:4px;display:block">${biz}</span>`;
                relHtml += `<div class="relation-tags">`;
                byBiz[biz].forEach(p => {
                    const coopKey = p.nodeId + '|' + biz;
                    const coops = prodBizCoopMap[coopKey] || [];
                    const coopSuffix = coops.length > 0 ? ` <span style="font-size:9px;color:#1abc9c">(${coops.join('/')})</span>` : '';
                    relHtml += `<span class="relation-tag product" onclick="jumpToNode('${p.nodeId}')">${p.name}${coopSuffix}</span>`;
                });
                relHtml += `</div></div>`;
            });
            
            document.getElementById('detailRelations').innerHTML = relHtml || '<p style="color:#999;font-size:12px;text-align:center;padding:20px">暂无关联</p>';
        }
        
        document.getElementById('focusHint').classList.add('active');
        document.getElementById('breadcrumb').classList.add('active');
        
        renderChart();
    }
    
    function jumpToNode(nodeId) {
        const node = allNodes.find(n => n.id === nodeId);
        if (node) {
            showNodeDetail(node);
        }
    }
    
    function closeDetail() {
        document.getElementById('detailPanel').classList.remove('active');
        document.getElementById('focusHint').classList.remove('active');
        document.getElementById('breadcrumb').classList.remove('active');
        currentNodeId = null;
        isFocused = false;
        renderChart();
    }
    
    function resetView() {
        isFocused = false;
        currentNodeId = null;
        document.getElementById('detailPanel').classList.remove('active');
        document.getElementById('focusHint').classList.remove('active');
        document.getElementById('breadcrumb').classList.remove('active');
        renderChart();
    }

        showNodeDetail(params.data);
    });

    document.getElementById('btnProducts').addEventListener('click', () => {

        document.querySelectorAll('.toolbar-btn').forEach(b => b.classList.remove('active'));

        renderChart();
    });

    // 切片器固定展开/收起
    let isPinned = false;
    document.getElementById('legendTab').addEventListener('click', (e) => {
        e.stopPropagation();
        isPinned = !isPinned;
        const container = document.getElementById('legendContainer');
        if (isPinned) {
            container.classList.add('pinned');
            document.getElementById('legend').classList.add('expanded');
        } else {
            container.classList.remove('pinned');
            document.getElementById('legend').classList.remove('expanded');
        }
    });
    
    // 详情面板拖拽
    const detailPanel = document.getElementById('detailPanel');
    let isDragging = false;
    let dragOffsetX, dragOffsetY;
    
    detailPanel.addEventListener('mousedown', (e) => {
        if (e.target.closest('.detail-close') || e.target.closest('.relation-tag')) return;
        isDragging = true;
        detailPanel.style.cursor = 'grabbing';
        const rect = detailPanel.getBoundingClientRect();
        dragOffsetX = e.clientX - rect.left;
        dragOffsetY = e.clientY - rect.top;
        detailPanel.style.transform = 'none';
        detailPanel.style.top = rect.top + 'px';
        detailPanel.style.right = 'auto';
        detailPanel.style.left = rect.left + 'px';
    });
    
    document.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        detailPanel.style.left = (e.clientX - dragOffsetX) + 'px';
        detailPanel.style.top = (e.clientY - dragOffsetY) + 'px';
    });
    
    document.addEventListener('mouseup', () => {
        if (isDragging) {
            isDragging = false;
            detailPanel.style.cursor = 'move';
        }
    });
